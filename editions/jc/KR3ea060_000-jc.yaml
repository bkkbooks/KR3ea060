front:
  text: 序素問靈樞醫之大經大法在焉後世諸方書皆本於此然其言簡古淵涵未易通曉故秦越人發為八十一難所以推明其義也然越人去古未遠其言亦深一文一字意周旨密故為之註釋者亦數十家但各以臆見而卒無歸之一論或得此而失彼或舉前而遺後非惟自誤又以誤人識者病焉許昌滑君伯仁篤實詳敏博極群書工於醫者三十四年起廢愈痼不可勝紀遂晝惟夕思旁推遠索作難經本義二卷析其精微探其隱賾鉤其玄要疑者辨之誤者正之諸家之善者取之於是難經之書辭達理明條分縷解而素問靈樞之奧亦由是而得矣夫人之生死繫於醫醫之本原出於經經之旨不明其害可勝言哉然則伯仁之功豈小補者耶至正二十六年二月工部郎中揭汯序序醫之為道聖矣自神農氏凡草木金石可濟夫夭死札瘥悉列諸經而八十一難自秦越人推本軒岐鬼臾區之書發難析疑論辨精詣鬼神無遁情為萬世法其道與天地並立功豈小補也哉且夫人以七尺之軀五臟百骸受病六氣之診乃繫於三指點按之下一呼一吸之間無有形影特切其洪細濡伏若一發苟或謬誤則脈生而藥死之矣而可輕以譚醫而可易以習醫邪寓鄞滑伯仁故家許許去東垣近蚤為李氏之學遂名於醫予雅聞之未識也今年秋來遺所撰難經本義閱之使人起敬有是哉君之精意於醫也條釋圖陳脈絡尺寸部候虛實簡而通決而明予雖未嘗學而思亦周半矣嗚呼醫之道生道也道行則生意充宇宙澤流無窮人以壽死是則往聖之心也世之學者能各置一通於側而深求力討之不為良醫也者幾希嗚呼越人我師也伯仁不為我而刊諸梓與天下之人共之是則伯仁之心也故舉其大指為序至正二十五年龍集甲辰十月既望翰林學士承旨榮祿大夫知制誥兼修國史張翥序序粵自神農咀百藥而寒溫辛酸甘苦品制之宜君臣佐使之用具諸本草治藥者於焉依據曰黃帝作素問內經凡受病根源俞府皆切脈而知故秦越人因之設為八十一難問答究竟精微盡醫師之道焉世之醫者率熟診而察腓而審證而治藥若難經一書誠大本領苟不由難經而出其亦庸醫乎余觀注本草者若今東陽朱彥修氏所著已無餘蘊而解難經者不知其幾家求諸精詣十無一二許昌滑君伯仁甫挾岐黃之術學仿於東垣李先生精於診而審於劑者也愈疴起痼活人居多余坐足疾人人治而弗痊有言伯仁善治法余致之聽其議論皆自難經而來迥異於世之言醫者豈異哉究理義之精微眾人固弗識也因出示所述難經本義二卷發前人所未發之旨首列諸圖後疏本義蓋其儒者積學二十餘年凡醫之書無不參考而折衷己意各條問答之下於戲其用心亦仁矣得之者可以趨黃帝岐伯之庭而問崆峒壽域也雖然吾聞之望而知其病者謂之神聞而知者謂之聖又問而知者謂之工至於診脈淺深呼吸至數而後能療治者得巧之道焉神聖工詎得見矣今所求者巧耳於巧之中又不可以言語文字傳者若扁之起虢緩之視膏肓於難經乎何有然與否也吾其審於伯仁甫云至正二十有一年重光赤奮若之歲臘月既望奉直大夫溫州路總管管內勸農兼防禦事天台劉仁本敘
