body:
  text: 凡例難經正文周仲立李子野輩擅加筆削今並不從紀齊卿於經中盛字多改作甚字豈國諱或家諱有所避耶蓋昧於臨文不諱之義也今不從經中錯簡衍文辯見各篇之下仍為缺誤總類以見其概八十一難經隋唐書經籍藝文志俱云二卷後人或釐而為三或分而為五今仍為二卷以復書志之舊揚玄操復為十三類以統之今亦不從說見後匯考中本義中引諸書者具諸書之名引諸家者具諸家之名其無所引具及愚按愚謂者則區區之臆見也其設為或問亦同本義引諸家之說有以文義相須為先後者有以論說高下為先後者無是二者則以說者之世次為先後云難經八十一篇蓋越人取內經靈樞之言設為問答前此注家皆不考所出今並一一考之其無可考者於七難內發其例闕誤總類七難三陰三陽次第脈經與此不同脈經於三陽則少陽太陽陽明三陰則少陰大陰厥陰十二難馮氏謂此篇合入用針補寫之類當在六十難之後以類相從也十四難反此者至於收病也當作至脈之病也於收二字誤十六難問三部九候以下共六件而篇中並不答所問似有缺誤十七難所問者三所答者一疑有缺漏十八難第三節謝氏謂當是十六難中答辭第四節或謂當是十七難中或連年月不已答辭二十難重陽者狂重陰者癲脫陽者見鬼脫陰者目盲當是五十九難結句之文錯簡在此二十一難謝氏曰按本經所答辭意不屬似有脫誤二十三難經云明知終始云云一節謝氏謂合在下篇之前不必然也只參看二十八難溢畜不能環流灌溉諸經者也十二字當在十二經亦不能拘之之下其受邪氣畜則腫熱砭射之也十二字謝氏直以為衍文或云當在三十七難關格不得盡其命而死矣之下因邪在六腑而言也二十九難陽維為病苦寒熱陰維為病苦心痛諸本皆在腰溶溶若坐水中下謝氏移置溶溶不能自收持下文理順從必有所考而然今從之三十一難其府在氣街一句疑錯簡或衍文三焦自屬諸府與手心主配各有所不應又有府也四十八難診之虛實下濡者為虛牢者為實八字脈經無之謝氏以為衍文楊氏謂按之皮肉柔濡為虛牢強者為實然則有亦無害四十九難第五節虛為不欲食實為欲食二句於上下文無所關疑錯簡或衍六十難其真心痛者真字下當有一頭字蓋總結上兩節也六十九難當先補之然後寫之八字疑衍七十四難篇中文義似有缺誤今且依此解之俟後之知者七十五難金不得平木不字疑衍詳見本篇八十一難是病二字非誤即衍閥誤總類畢難經匯考史記越人傳載趙簡子虢太子齊桓侯三疾之治而無著難經之說隋書經籍志唐書藝文志俱有秦越人黃帝八十一難經二卷之目又唐諸王侍讀張寧節作史記正義於扁鵲倉公傳則全引難經文以釋其義傳後全載四十二難與第一難二十七難全文由此則知古傳以為秦越人所作者不誣也詳其設問之辭稱經言者出於素問靈樞二經之文在靈樞者尤多亦有二經無所見者豈越人別有摭於古經或自設為問答也那邵庵虞先生嘗曰史記不載越人著難經而隋唐書經籍藝文志定著越人難經之目作史記正義者直載難經數章愚意以為古人因經設難或與門人弟子問答偶得此八十一章耳未必經之當難者止此八十一條難由經發不特立言且古人不求託名於書故傳之者唯專門名家而已其後流傳寢廣官府得以錄而著其目注家得以引而成文耳圭齊歐陽公曰切脈於手之寸口其法自秦越人始蓋為醫者之祖也難經先秦古文漢以來答客難等作皆出其後又文字相質難之祖也楊玄操序謂黃帝有內經二帙其義幽賾殆難究覽越人乃採摘二部經內精要凡八十一章伸演其道名八十一難經以其理趣深遠非卒易了故也紀天錫云秦越人將黃帝素問疑難之義八十一篇重而明之故曰八十一難經宋治平間京兆黎泰辰序虞庶難經注云世傳黃帝八十一難經謂之難者得非以人之五臟六腑隱於內為邪所幹不可測知唯以脈理究其彷彿邪若脈有重十二菽者又有如按車蓋而若循雞羽者復考內外之症以參校之不其難乎按歐虞說則難字當為去聲余皆奴丹切丁德用補註題云難經歷代傳之一人至魏華佗乃燼其文於獄下於晉宋之間雖有仲景叔和之書然各示其文而濫觴其說及吳太醫令呂廣重編此經而尚文義差迭按此則難經為燼餘之文其編次復重經呂廣之手固不能無缺失也謝氏謂難經王宗正注義圖解大概以診脈之法心肺俱浮腎肝俱沉脾在中州為正而已至於他注家所引寸關尺而分兩手部位及五臟六腑之脈並時分見於尺寸皆以為王氏脈經之非殊不知脈之所以分兩手者出於素問脈要精微論其文甚明越人復推明之於十難中言一脈變為十以五臟六腑相配而言非始於叔和也且三部之說有二一則四難所謂心肺俱浮腎肝俱沉脾者中州與第五難菽法輕重同而三部之中又各自分上中下云一則脈要精微論之五臟部位即二難之分寸關尺十難之一脈變為十者也若止以心肺俱浮腎肝俱沉脾為中州一法言之則亦不必分寸關尺而十難所謂一脈十變者何從而推之蘄水龐安常有難經解數萬言惜乎無傳諸家經解馮氏丁氏傷於鑿虞氏傷於巧李氏周氏傷於任王呂晦而舛楊氏紀氏大醇而小疵唯近世謝氏說殊有理致源委及袁氏者古益人著難經本旨佳處甚多然其因襲處未免踵前人之非且失之冗爾潔古氏藥注疑其草稿姑立章指義例未及成書也今所見者往往言論於經不相涉且無文理潔古平日著述極醇正此絕不相似不知何自遂乃板行反為先生之累豈好事者為之而托為先生之名邪要之後來東垣海藏羅謙甫輩皆不及見若見必當與足成其說不然亦迴護之不使輕易流傳也難經八十一篇辭若甚簡然而榮衛度數尺寸位置陰陽王相臟腑內外脈法病能與夫經絡流注針刺俞穴莫不該盡昔人有以十三類統之者於乎此經之義大無不包細無不舉十三類果足以盡之與八十一篇果不出於十三類與學者求之篇章之間則其義自見矣此書固有類例也但當如大學朱子分章以見記者之意則可不當以己之立類統經之篇章也今觀一難至二十一難皆言脈二十二難至二十九難言經絡流注始終長短度數奇經之行及病之吉凶也其間有云脈者非謂尺寸之脈乃經絡之脈也三十難至四十二難言榮衛三焦臟腑腸胃之詳四十四五難言七衝門乃人身資生之用八會為熱病在內之氣穴也四十六七難言老幼寤寐以明氣血盛衰言人面耐寒以見陰陽之走會四十八難至六十一難言診候病能臟腑積聚泄利傷寒雜病之別而繼之以望聞問切醫之能事畢矣六十二難至八十一難言臟腑滎俞用針補瀉之法又全體之學所不可無者此記者以類相從始終之意備矣十一難云肝有兩葉四十一難云肝左三葉右葉四凡七葉言兩葉者舉其大言七葉盡其詳左三右四亦自相陰陽之義肝屬木木為少陽故其數七肺屬金金為少陰故六葉兩耳其數八心色赤而中虛離之象也脾形象馬蹄而居中土之義也腎有兩枚習坎之謂也此五臟配合陰陽皆天地自然之理非人之所能為者若馬之無膽兔之無脾物固不得其全矣周子云木陽稚金陰稚是也東坡先生楞伽經跋云如醫之有難經句句皆理字字皆法後世達者神而明之如盤走珠如珠走盤無不可者若出新意而棄舊學以為無用非愚無知則狂而已譬如俚俗醫師不由經論直授藥方以之療病非不或中至於遇病輒應懸斷死生則與知經學古者不可同日語矣世人徒見其有一至之功或捷於古人因謂難經不學而可豈不誤哉晦庵先生跋郭長陽醫書云予嘗謂古人之於脈其察之固非一道矣然今世通行惟寸關尺之法為最要且其說具於難經之首篇則亦非不俚俗說也故郭公此書備載其語而並取丁德用密排三指之法以釋之夫難經則至矣至於德用之法則予竊意診者之指有肥瘠病者之臂有長短以是相求或未得為定論也蓋嘗細考經之所以分尺寸者皆自關而前卻以距手魚際尺澤是則所謂關者必有一定之處亦若魚際尺澤之可以外見而先識也然今諸書皆無的然之論惟千金以為寸口之處其骨自高而關尺皆由是而卻取焉則其言之先後位之進退若與經文不合獨俗間所傳脈訣五七言韻語者詞最鄙淺非叔和本書明甚乃能直指高骨為關而分其前後以為尺寸陰陽之位似得難經本旨然世之高醫以其贗也遂委棄而羞言之予非精於道者不能有以正也姑附見其說於此以俟明者而折中焉廬陵謝堅白曰泰定四年丁卯愚教授龍興建言憲司請刻叔和脈經本書十卷時儒學提舉東陽柳公道傳序其端曰朱文公云俗傳脈訣辭最鄙淺而取其直指高骨為關之說為合於難經雖文公亦似未知其正出脈經正謂此跋也然文公雖未見脈經而其言與脈經吻合脈訣雖非叔和書其人亦必知讀脈經者但不當自立七表八里九道之目遂與脈經所載二十四種脈之名義大有牴牾致使後人疑焉項氏家說曰凡經絡之所出為井所留為滎所注為腧所過為原所行為經所入為合井象水之泉滎象水之陂腧象水之竇竇即窬字也經象水之流合象水之歸皆取水之義也下同藏五而府六藏穴五而府穴六猶干五而支六聲五而律六皆陰陽之數自然之理雖增手厥陰一臟其實心之包絡不異於心即一臟而二經也經之必為十二猶十二支十二辰十二月十二律不可使為十一亦自然之理也寅卯為木巳午為火申酉為金亥子為水四行皆二支耳而土行獨當辰戌丑未四支以成十二肺肝脾腎四臟皆二經而心與包絡共當四經以成十二此豈人之所能為哉右寸手太陰陽明金生左尺足太陽少陰水太陽少陰水生左關足厥陰少陽木厥陰少陽木生左寸手太陽少陰火太陽少陰火通右尺手心主少陽火手心主少陽火生右關足太陰陽明土足太陰陽明土復生右寸手太陰陽明金此皆五行子母更相生養者也虞氏曰經言男子生於寅女子生於申謂其父母之年會合於已上男左行十月至寅而生女右行十月至申而生也故推命家言男一歲起丙寅女一歲起壬申難經不言起而言生謂生下已為一歲矣壬丙二干水火也水火為萬物之父母寅申二支金木也為生物成實之終始木飽在申金飽在寅二氣自飽相配故用寅申也金生於巳巳與申合故女子取申木生於亥亥與寅合故男子取寅所以男年十歲順行在亥女年七歲逆行在亥男子十六天癸至左行至巳巳者申之生氣女年十四天癸至右行亦在巳與男年同在本宮生氣之位陰陽相配成夫婦之道故有男女也上古天真論曰男子二八而天癸至精氣溢瀉陰陽和故能有子女子二七天癸至任脈通太衝脈盛故能有子此之謂也經云地氣上為云天氣下為雨清者體之上也陽也火也離中之一陰降故午後一陰生即心之生血也故曰清氣為榮天之清不降天之濁能降為六陰驅而使之下也云清氣者總離之體而言之濁者體之下也陰也水也坎中之一陽升故子後一陽生即腎之生氣也故曰濁氣為衛雨出地氣云出天氣此之謂也地之濁不升地之清能升為六陽舉使之上也濁氣者總坎之體而言之肺主聲肝主色心主臭脾主味腎主液是五臟各有所主也然而一臟之中又各有聲色臭味液五五二十五五行錯綜之道也肝主聲肝主色心主臭脾主味腎主液是五臟各有所主也然而一臟之中又各有聲色臭味液五五二十五五行錯綜之道也
